<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f97316" />
  <title>CookMate - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafaf9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(249, 115, 22, 0.3);
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      color: #1c1917;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #78716c;
      max-width: 280px;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .btn {
      background: #f97316;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(249, 115, 22, 0.3);
      transition: all 0.2s;
    }
    .btn:hover {
      background: #ea580c;
      transform: translateY(-1px);
    }
    .cached-notice {
      margin-top: 16px;
      padding: 12px 20px;
      background: #fef3c7;
      border-radius: 12px;
      font-size: 13px;
      color: #92400e;
      max-width: 320px;
    }
  </style>
</head>
<body>
  <img src="/pwa-192x192.png" alt="CookMate" class="logo" />
  <h1>You're offline</h1>
  <p>Check your internet connection and try again.</p>
  <button class="btn" onclick="location.reload()">Retry</button>
  
  <div class="cached-notice" id="cachedNotice" style="display: none;">
    📱 Some recipes are available offline. Try opening a recipe you viewed before.
  </div>

  <script>
    // Check if we have any cached data
    if ('caches' in window) {
      caches.keys().then(names => {
        if (names.some(n => n.includes('cookmate'))) {
          document.getElementById('cachedNotice').style.display = 'block';
        }
      });
    }
    
    // If online, redirect to home
    if (navigator.onLine) {
      location.href = '/';
    }
  </script>
</body>
</html>
