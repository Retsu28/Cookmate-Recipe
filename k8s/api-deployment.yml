apiVersion: apps/v1
kind: Deployment
metadata:
  name: cookmate-api
  namespace: cookmate
  labels:
    app.kubernetes.io/name: cookmate-api
    app.kubernetes.io/component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cookmate-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: cookmate-api
        app.kubernetes.io/name: cookmate-api
    spec:
      containers:
        - name: api
          image: ghcr.io/cookmate/api:latest
          ports:
            - containerPort: 5000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cookmate-config
            - secretRef:
                name: cookmate-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: cookmate
  labels:
    app.kubernetes.io/name: cookmate-api
spec:
  type: ClusterIP
  selector:
    app: cookmate-api
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
