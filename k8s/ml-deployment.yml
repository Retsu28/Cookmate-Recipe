apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: cookmate
  labels:
    app.kubernetes.io/name: ml-service
    app.kubernetes.io/component: ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
        - name: ml-service
          image: ghcr.io/cookmate/ml-service:latest
          ports:
            - containerPort: 8001
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: cookmate-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: cookmate-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: cookmate-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cookmate-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cookmate-secrets
                  key: DB_PASSWORD
            - name: ML_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cookmate-secrets
                  key: ML_API_KEY
            - name: EXPRESS_ORIGIN
              value: "http://api-service:5000"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: cookmate
spec:
  type: ClusterIP
  selector:
    app: ml-service
  ports:
    - port: 8001
      targetPort: 8001
