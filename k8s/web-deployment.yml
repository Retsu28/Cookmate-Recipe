apiVersion: apps/v1
kind: Deployment
metadata:
  name: cookmate-web
  namespace: cookmate
  labels:
    app.kubernetes.io/name: cookmate-web
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cookmate-web
  template:
    metadata:
      labels:
        app: cookmate-web
    spec:
      containers:
        - name: web
          image: ghcr.io/cookmate/web:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: cookmate
spec:
  type: ClusterIP
  selector:
    app: cookmate-web
  ports:
    - port: 80
      targetPort: 80
