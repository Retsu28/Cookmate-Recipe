apiVersion: v1
kind: ConfigMap
metadata:
  name: cookmate-config
  namespace: cookmate
  labels:
    app.kubernetes.io/name: cookmate
data:
  NODE_ENV: "production"
  PORT: "5000"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "Cookmate"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_KEY_PREFIX: "cookmate:"
  ML_SERVICE_HOST: "ml-service"
  ML_SERVICE_PORT: "8001"
  BULL_CONCURRENCY: "3"
  CORS_ORIGINS: "https://cookmate.app"
